<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Deer You</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* TEXT */
#text {
    font-size: 22px;
    text-align: center;
    max-width: 80%;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 0.8s;
    margin-bottom: 32px;
    min-height: 60px;
}

/* CAROUSEL */
#carousel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
    transition: opacity 0.5s;
}

#carouselLabel {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
}

#carouselRow {
    display: flex;
    align-items: center;
    gap: 16px;
}

#carouselRow button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 28px;
    cursor: pointer;
    padding: 8px 12px;
    transition: color 0.2s;
}

#carouselRow button:hover {
    color: white;
}

#carouselImg {
    width: 200px;
    height: 260px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #222;
}

#carouselCounter {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
}

#okCarouselBtn {
    padding: 10px 40px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
}

#okCarouselBtn:hover {
    background: rgba(255,255,255,0.06);
    color: white;
}

/* KẾT QUẢ */
#result {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
    max-width: 80%;
    opacity: 0;
    transition: opacity 0.8s;
}

#resultTitle {
    font-size: 20px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
}

#resultSub {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
}

#resultDesc {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 1.8;
    margin-top: 4px;
}

#resultRare {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    margin-top: 4px;
}

#continueBtn {
    margin-top: 16px;
    padding: 10px 40px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
}

/* NEXT BTN */
#nextBtn {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 10px 20px;
    display: none;
}
</style>
</head>
<body>

<audio id="bgm" src="nhacnen" loop autoplay></audio>

<div id="text"></div>

<div id="carousel">
    <div id="carouselLabel"></div>
    <div id="carouselRow">
        <button onclick="carouselMove(-1)">‹</button>
        <img id="carouselImg" src="" alt="">
        <button onclick="carouselMove(1)">›</button>
    </div>
    <div id="carouselCounter"></div>
    <button id="okCarouselBtn" onclick="carouselSelect()">Chọn</button>
</div>

<div id="result">
    <div id="resultTitle"></div>
    <div id="resultSub"></div>
    <div id="resultDesc"></div>
    <div id="resultRare"></div>
    <button id="continueBtn" onclick="goNext()">Tiếp tục</button>
</div>

<button id="nextBtn" onclick="nextScene()">›</button>

<script>
const playerName = localStorage.getItem("playerName") || "Bạn";
const route = localStorage.getItem("route") || "A";

let currentId = null;
let picks = []; // [quanao, toc, mat] mỗi cái là 1-4

document.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    if (bgm.paused) bgm.play();
}, { once: true });

// ─── PERSONALITY MAP ───
const groups = {
    "01": { name: "Thiên thần đáng yêu", en: "Sunshine Girl", desc: "Bạn là người hoạt bát, thân thiện và luôn mang đến năng lượng tích cực cho những người xung quanh. Bạn dễ kết bạn, dễ rung động và thường làm theo cảm xúc của mình. Đôi khi bạn hơi bốc đồng, nhưng chính sự chân thành ấy lại khiến mọi người yêu quý bạn.", rare: "18%", rank: "5/8" },
    "02": { name: "Nàng thơ dịu dàng", en: "Gentle Angel", desc: "Bạn là người tinh tế, nhẹ nhàng và giàu lòng đồng cảm. Bạn luôn để ý đến cảm xúc của người khác và thường là người đứng ra hòa giải khi xảy ra mâu thuẫn.", rare: "15%", rank: "6/8" },
    "03": { name: "Cô gái bình thường", en: "Girl Next Door", desc: "Bạn sống đơn giản, thực tế và không thích trở thành tâm điểm chú ý. Dù không quá nổi bật, bạn lại là kiểu người khiến người khác cảm thấy thoải mái khi ở bên.", rare: "22%", rank: "8/8" },
    "04": { name: "Tâm hồn tự do", en: "Free Spirit", desc: "Bạn yêu tự do, thích khám phá và luôn bị thu hút bởi những điều mới lạ. Bạn ghét sự nhàm chán và thường tìm kiếm những trải nghiệm khác biệt.", rare: "11%", rank: "7/8" },
    "05": { name: "Cô nàng lạnh lùng", en: "Cool Beauty", desc: "Bạn độc lập, mạnh mẽ và luôn có chính kiến riêng. Vẻ ngoài lạnh lùng đôi khi khiến người khác e dè, nhưng bên trong bạn là một người đáng tin cậy.", rare: "14%", rank: "4/8" },
    "06": { name: "Mèo kiêu kỳ", en: "Tsundere Cat", desc: "Bạn không giỏi thể hiện cảm xúc thật. Dù luôn tỏ ra cứng rắn hoặc thờ ơ, bạn lại là người âm thầm quan tâm đến những người mình yêu quý nhất.", rare: "10%", rank: "3/8" },
    "07": { name: "Quý cô thanh lịch", en: "Elegant Lady", desc: "Bạn trưởng thành, điềm tĩnh và luôn suy nghĩ thấu đáo trước khi hành động. Mọi người thường tin tưởng và tìm đến bạn khi cần lời khuyên.", rare: "8%", rank: "2/8" },
    "08": { name: "Thiếu nữ bí ẩn", en: "Mystery Girl", desc: "Bạn là người khó đoán nhất trong tất cả các nhóm tính cách. Bạn không dễ mở lòng với người khác và luôn giữ lại cho mình một thế giới riêng. Chính điều đó khiến bạn trở nên đặc biệt và cuốn hút.", rare: "2%", rank: "1/8" },
};

const groupMap = {
    "111":"01","113":"01","131":"01","311":"01","112":"01","121":"01","211":"01",
    "222":"02","223":"02","232":"02","322":"02","122":"02","212":"02","221":"02",
    "333":"03","233":"03","323":"03","332":"03","133":"03","313":"03","331":"03",
    "444":"04","344":"04","434":"04","443":"04","244":"04","424":"04","442":"04",
    "114":"05","141":"05","411":"05","144":"05","414":"05","441":"05",
    "224":"06","242":"06","422":"06","234":"06","243":"06","324":"06","342":"06","423":"06","432":"06",
    "134":"07","143":"07","314":"07","341":"07","413":"07","431":"07","123":"07","132":"07","213":"07","231":"07","312":"07","321":"07",
    "124":"08","142":"08","214":"08","241":"08","412":"08","421":"08",
};

// ─── SCENES ───
const scenes = {
    g1: { text: "Này {name}, từ bây giờ bạn sẽ là nữ sinh 16 tuổi.", next: "g2" },
    g2: { text: "Hãy tự chăm chút ngoại hình của mình trước khi đi học nhé!", next: "g3" },
    g3: { action: "carousel", step: 0, next: "g4" },
    g4: { action: "carousel", step: 1, next: "g5" },
    g5: { action: "carousel", step: 2, next: "g6" },
    g6: { text: "Tính cách của bạn!", next: "g7" },
    g7: { action: "showResult" },
};

const carouselSteps = [
    {
        label: "Quần áo",
        images: ["outfit1.jpg", "outfit2.jpg", "outfit3.jpg", "outfit4.jpg"]
    },
    {
        label: "Tóc",
        images: ["hair1.jpg", "hair2.jpg", "hair3.jpg", "hair4.jpg"]
    },
    {
        label: "Khuôn mặt",
        images: ["face1.jpg", "face2.jpg", "face3.jpg", "face4.jpg"]
    }
];

let carouselIndex = 0;
let carouselStep = 0;
let carouselNextId = null;

// ─── ENGINE ───
function displayText(txt, cb) {
    const el = document.getElementById("text");
    el.style.opacity = 0;
    setTimeout(() => {
        el.innerText = txt.replace(/{name}/g, playerName);
        el.style.opacity = 1;
        if (cb) setTimeout(cb, 400);
    }, 800);
}

function hideAll() {
    document.getElementById("carousel").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
}

function showScene(id) {
    currentId = id;
    const scene = scenes[id];
    if (!scene) return;
    hideAll();

    if (scene.action === "carousel") {
        carouselStep = scene.step;
        carouselNextId = scene.next;
        displayText("", () => openCarousel(carouselStep));
        document.getElementById("text").style.opacity = 0;
        setTimeout(() => openCarousel(carouselStep), 300);
        return;
    }

    if (scene.action === "showResult") {
        displayText("", () => {});
        setTimeout(() => showResult(), 500);
        return;
    }

    displayText(scene.text);
    if (scene.next) {
        setTimeout(() => {
            document.getElementById("nextBtn").style.display = "block";
        }, 900);
    }
}

function nextScene() {
    const scene = scenes[currentId];
    if (scene && scene.next) showScene(scene.next);
}

// ─── CAROUSEL ───
function openCarousel(step) {
    hideAll();
    carouselIndex = 0;
    const data = carouselSteps[step];
    document.getElementById("carouselLabel").innerText = data.label;
    updateCarouselImg();
    const el = document.getElementById("carousel");
    el.style.display = "flex";
    setTimeout(() => el.style.opacity = 1, 50);
}

function updateCarouselImg() {
    const data = carouselSteps[carouselStep];
    document.getElementById("carouselImg").src = data.images[carouselIndex];
    document.getElementById("carouselCounter").innerText = `${carouselIndex + 1} / ${data.images.length}`;
}

function carouselMove(dir) {
    const data = carouselSteps[carouselStep];
    carouselIndex = (carouselIndex + dir + data.images.length) % data.images.length;
    updateCarouselImg();
}

function carouselSelect() {
    picks[carouselStep] = carouselIndex + 1; // 1-4
    document.getElementById("carousel").style.opacity = 0;
    setTimeout(() => {
        document.getElementById("carousel").style.display = "none";
        showScene(carouselNextId);
    }, 400);
}

// ─── RESULT ───
function showResult() {
    const code = picks.join(""); // "134" etc
    const groupId = groupMap[code] || "07";
    const g = groups[groupId];

    localStorage.setItem("group", groupId);
    localStorage.setItem("personality", g.name);
    localStorage.setItem("branch", route + groupId); // e.g. A07

    document.getElementById("resultTitle").innerText = g.name;
    document.getElementById("resultSub").innerText = g.en;
    document.getElementById("resultDesc").innerText = g.desc;
    document.getElementById("resultRare").innerText = `Độ hiếm: ${g.rare}  ·  Xếp hạng: ${g.rank}`;

    const el = document.getElementById("result");
    el.style.display = "flex";
    setTimeout(() => el.style.opacity = 1, 50);
}

function goNext() {
    // Sau này dẫn vào cốt truyện tiếp theo
    alert("Sắp ra mắt...");
}

// ─── START ───
showScene("g1");
</script>
</body>
</html>
