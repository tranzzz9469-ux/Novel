<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deer You</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: pan-y;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    font-size: 26px;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#text {
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    max-width: 80%;
    line-height: 1.7;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#nextBtn {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 18px;
    padding: 10px 20px;
    display: none;
}

#choiceBox {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    gap: 12px;
    align-items: center;
}

.choiceBtn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    font-size: 15px;
    padding: 10px 32px;
    cursor: pointer;
    letter-spacing: 1px;
    min-width: 160px;
}

#overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 10;
}

#nameBox {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 300px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px 24px 20px;
    text-align: center;
}

#nameBox h2 {
    margin: 0 0 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    font-weight: 400;
}

#nameInput {
    width: 100%;
    font-size: 17px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    text-align: center;
}

#nameInput::placeholder {
    color: rgba(255,255,255,0.2);
    font-size: 14px;
}

#okBtn {
    margin-top: 10px;
    padding: 9px 0;
    width: 100%;
    font-size: 13px;
    background: none;
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    cursor: pointer;
}

#carousel {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transition: opacity 0.5s;
}

#carouselLabel {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
}

#carouselRow {
    display: flex;
    align-items: center;
    gap: 16px;
}

#carouselRow button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 32px;
    cursor: pointer;
    padding: 8px;
}

#carouselImg {
    width: 180px;
    height: 240px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #222;
}

#carouselCounter {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
}

#okCarouselBtn {
    padding: 10px 40px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
}

#result {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    max-width: 82%;
    opacity: 0;
    transition: opacity 0.8s;
}

#resultTitle { font-size: 20px; letter-spacing: 2px; }
#resultSub { font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
#resultDesc { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-top: 6px; }
#resultRare { font-size: 13px; color: rgba(255,255,255,0.3); }

#continueBtn {
    margin-top: 16px;
    padding: 10px 40px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
}
</style>
</head>
<body>

<audio id="bgm" src="bliss - lofi hip hop beat (FREE FOR PROFIT USE) [-UfI1X-MSig].mp3" loop autoplay></audio>

<div id="text"></div>
<div id="overlay"></div>

<div id="nameBox">
    <h2>Nhập tên của bạn</h2>
    <input type="text" id="nameInput" placeholder="Tên của bạn...">
    <button id="okBtn" onclick="saveName()">Xác nhận</button>
</div>

<div id="carousel">
    <div id="carouselLabel"></div>
    <div id="carouselRow">
        <button onclick="carouselMove(-1)">‹</button>
        <img id="carouselImg" src="" alt="">
        <button onclick="carouselMove(1)">›</button>
    </div>
    <div id="carouselCounter"></div>
    <button id="okCarouselBtn" onclick="carouselSelect()">Chọn</button>
</div>

<div id="result">
    <div id="resultTitle"></div>
    <div id="resultSub"></div>
    <div id="resultDesc"></div>
    <div id="resultRare"></div>
    <button id="continueBtn" onclick="goNext()">Tiếp tục</button>
</div>

<button id="nextBtn" onclick="nextScene()">›</button>
<div id="choiceBox"></div>

<script>
let playerName = "";
let route = "";
let group = "";
let branch = "";
let currentId = null;
let picks = [];
let carouselIndex = 0;
let carouselStep = 0;
let carouselNextId = null;

document.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    if (bgm.paused) bgm.play();
}, { once: true });

const groups = {
    "01": { name: "Thiên thần đáng yêu", en: "Sunshine Girl", desc: "Bạn là người hoạt bát, thân thiện và luôn mang đến năng lượng tích cực cho những người xung quanh. Bạn dễ kết bạn, dễ rung động và thường làm theo cảm xúc của mình. Đôi khi bạn hơi bốc đồng, nhưng chính sự chân thành ấy lại khiến mọi người yêu quý bạn.", rare: "18%", rank: "5/8" },
    "02": { name: "Nàng thơ dịu dàng", en: "Gentle Angel", desc: "Bạn là người tinh tế, nhẹ nhàng và giàu lòng đồng cảm. Bạn luôn để ý đến cảm xúc của người khác và thường là người đứng ra hòa giải khi xảy ra mâu thuẫn.", rare: "15%", rank: "6/8" },
    "03": { name: "Cô gái bình thường", en: "Girl Next Door", desc: "Bạn sống đơn giản, thực tế và không thích trở thành tâm điểm chú ý. Dù không quá nổi bật, bạn lại là kiểu người khiến người khác cảm thấy thoải mái khi ở bên.", rare: "22%", rank: "8/8" },
    "04": { name: "Tâm hồn tự do", en: "Free Spirit", desc: "Bạn yêu tự do, thích khám phá và luôn bị thu hút bởi những điều mới lạ. Bạn ghét sự nhàm chán và thường tìm kiếm những trải nghiệm khác biệt.", rare: "11%", rank: "7/8" },
    "05": { name: "Cô nàng lạnh lùng", en: "Cool Beauty", desc: "Bạn độc lập, mạnh mẽ và luôn có chính kiến riêng. Vẻ ngoài lạnh lùng đôi khi khiến người khác e dè, nhưng bên trong bạn là một người đáng tin cậy.", rare: "14%", rank: "4/8" },
    "06": { name: "Mèo kiêu kỳ", en: "Tsundere Cat", desc: "Bạn không giỏi thể hiện cảm xúc thật. Dù luôn tỏ ra cứng rắn hoặc thờ ơ, bạn lại là người âm thầm quan tâm đến những người mình yêu quý nhất.", rare: "10%", rank: "3/8" },
    "07": { name: "Quý cô thanh lịch", en: "Elegant Lady", desc: "Bạn trưởng thành, điềm tĩnh và luôn suy nghĩ thấu đáo trước khi hành động. Mọi người thường tin tưởng và tìm đến bạn khi cần lời khuyên.", rare: "8%", rank: "2/8" },
    "08": { name: "Thiếu nữ bí ẩn", en: "Mystery Girl", desc: "Bạn là người khó đoán nhất trong tất cả các nhóm tính cách. Bạn không dễ mở lòng với người khác và luôn giữ lại cho mình một thế giới riêng. Chính điều đó khiến bạn trở nên đặc biệt và cuốn hút.", rare: "2%", rank: "1/8" },
};

const groupMap = {
    "111":"01","113":"01","131":"01","311":"01","112":"01","121":"01","211":"01",
    "222":"02","223":"02","232":"02","322":"02","122":"02","212":"02","221":"02",
    "333":"03","233":"03","323":"03","332":"03","133":"03","313":"03","331":"03",
    "444":"04","344":"04","434":"04","443":"04","244":"04","424":"04","442":"04",
    "114":"05","141":"05","411":"05","144":"05","414":"05","441":"05",
    "224":"06","242":"06","422":"06","234":"06","243":"06","324":"06","342":"06","423":"06","432":"06",
    "134":"07","143":"07","314":"07","341":"07","413":"07","431":"07","123":"07","132":"07","213":"07","231":"07","312":"07","321":"07",
    "124":"08","142":"08","214":"08","241":"08","412":"08","421":"08",
};

const carouselSteps = [
    { label: "Quần áo",    images: ["outfit1.jpg","outfit2.jpg","outfit3.jpg","outfit4.jpg"] },
    { label: "Tóc",        images: ["hair1.jpg","hair2.jpg","hair3.jpg","hair4.jpg"] },
    { label: "Khuôn mặt", images: ["face1.jpg","face2.jpg","face3.jpg","face4.jpg"] },
];

const scenes = {
    s1: { text: "Chào!", next: "s2" },
    s2: { text: 'Bạn vừa xuyên không vào cuốn tiểu thuyết ảo "Deer You"', next: "s3" },
    s3: { text: "Bạn muốn bắt đầu?", choices: [
        { text: "Không", action: "quit" },
        { text: "Có", next: "s4" }
    ]},
    s4: { action: "getName", next: "s5" },
    s5: { text: "Giới tính của bạn: Nữ\nBạn thích...", choices: [
        { text: "Nữ",  next: "g1", setRoute: "A" },
        { text: "Nam", next: "g1", setRoute: "B" }
    ]},
    g1: { text: "Này {name}, từ bây giờ bạn sẽ là nữ sinh 16 tuổi.", next: "g2" },
    g2: { text: "Hãy tự chăm chút ngoại hình của mình trước khi đi học nhé!", next: "g3" },
    g3: { action: "carousel", step: 0, next: "g4" },
    g4: { action: "carousel", step: 1, next: "g5" },
    g5: { action: "carousel", step: 2, next: "g6" },
    g6: { text: "Tính cách của bạn!", next: "g7" },
    g7: { action: "showResult" },
    // ── Thêm cốt truyện tiếp theo ở đây ──
};

function hideAll() {
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("choiceBox").style.display = "none";
    document.getElementById("carousel").style.display = "none";
    document.getElementById("carousel").style.opacity = 0;
    document.getElementById("result").style.display = "none";
    document.getElementById("result").style.opacity = 0;
}

function displayText(txt) {
    const el = document.getElementById("text");
    el.style.opacity = 0;
    setTimeout(() => {
        el.innerText = txt.replace(/{name}/g, playerName);
        el.style.opacity = 1;
    }, 800);
}

function showScene(id) {
    currentId = id;
    const scene = scenes[id];
    if (!scene) return;
    hideAll();

    if (scene.action === "getName") {
        displayText("Nhập tên cho nhân vật của bạn");
        setTimeout(() => openNameBox(), 1000);
        return;
    }
    if (scene.action === "carousel") {
        carouselStep = scene.step;
        carouselNextId = scene.next;
        document.getElementById("text").style.opacity = 0;
        setTimeout(() => openCarousel(carouselStep), 400);
        return;
    }
    if (scene.action === "showResult") {
        document.getElementById("text").style.opacity = 0;
        setTimeout(() => showResult(), 400);
        return;
    }

    displayText(scene.text);
    if (scene.choices) {
        setTimeout(() => showChoices(scene.choices), 1000);
    } else if (scene.next) {
        setTimeout(() => document.getElementById("nextBtn").style.display = "block", 900);
    }
}

function nextScene() {
    const scene = scenes[currentId];
    if (scene && scene.next) showScene(scene.next);
}

function showChoices(choices) {
    const box = document.getElementById("choiceBox");
    box.innerHTML = "";
    choices.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "choiceBtn";
        btn.innerText = c.text;
        btn.onclick = () => {
            if (c.action === "quit") { if (confirm("Bạn muốn thoát?")) window.close(); return; }
            if (c.setRoute) route = c.setRoute;
            box.style.display = "none";
            showScene(c.next);
        };
        box.appendChild(btn);
    });
    box.style.display = "flex";
}

function openNameBox() {
    document.getElementById("overlay").style.display = "block";
    document.getElementById("nameBox").style.display = "block";
    document.getElementById("nameInput").focus();
}

function saveName() {
    const input = document.getElementById("nameInput").value.trim();
    if (input === "") return;
    playerName = input;
    document.getElementById("overlay").style.display = "none";
    document.getElementById("nameBox").style.display = "none";
    showScene(scenes[currentId].next);
}

document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") saveName();
});

function openCarousel(step) {
    carouselIndex = 0;
    const data = carouselSteps[step];
    document.getElementById("carouselLabel").innerText = data.label;
    updateCarouselImg();
    const el = document.getElementById("carousel");
    el.style.display = "flex";
    setTimeout(() => el.style.opacity = 1, 50);
}

function updateCarouselImg() {
    const data = carouselSteps[carouselStep];
    document.getElementById("carouselImg").src = data.images[carouselIndex];
    document.getElementById("carouselCounter").innerText = `${carouselIndex + 1} / ${data.images.length}`;
}

function carouselMove(dir) {
    const len = carouselSteps[carouselStep].images.length;
    carouselIndex = (carouselIndex + dir + len) % len;
    updateCarouselImg();
}

function carouselSelect() {
    picks[carouselStep] = carouselIndex + 1;
    const el = document.getElementById("carousel");
    el.style.opacity = 0;
    setTimeout(() => { el.style.display = "none"; showScene(carouselNextId); }, 400);
}

function showResult() {
    const code = picks.join("");
    const groupId = groupMap[code] || "07";
    const g = groups[groupId];
    group = groupId;
    branch = route + groupId;

    document.getElementById("resultTitle").innerText = g.name;
    document.getElementById("resultSub").innerText = g.en;
    document.getElementById("resultDesc").innerText = g.desc;
    document.getElementById("resultRare").innerText = `Độ hiếm: ${g.rare}  ·  Xếp hạng: ${g.rank}`;

    const el = document.getElementById("result");
    el.style.display = "flex";
    setTimeout(() => el.style.opacity = 1, 50);
}

function goNext() {
    // Thêm scene tiếp theo ở đây
}

showScene("s1");
</script>
</body>
</html>
