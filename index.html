<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Novel</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    font-size: 32px;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#text {
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    max-width: 80%;
}

/* Nút tiếp theo */
#nextBtn {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 18px;
    padding: 10px 20px;
}

/* Overlay */
#overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 10;
}

/* Hộp nhập tên */
#nameBox {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;

    width: 300px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px 24px 20px;
    box-sizing: border-box;
    text-align: center;
}

#nameBox h2 {
    margin: 0 0 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    font-weight: 400;
}

#nameBox .divider { display: none; }
#nameBox p { display: none; }

#nameInput {
    width: 100%;
    font-size: 17px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    box-sizing: border-box;
    text-align: center;
}

#nameInput::placeholder {
    color: rgba(255,255,255,0.2);
    font-size: 14px;
}

#okBtn {
    margin-top: 10px;
    padding: 9px 0;
    width: 100%;
    font-size: 13px;
    background: none;
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- Nhạc nền: thay "nhacnen" bằng tên file nhạc của bạn -->
<audio id="bgm" src="bliss - lofi hip hop beat (FREE FOR PROFIT USE) [-UfI1X-MSig].mp3" loop autoplay></audio>

<img id="image">
<div id="text"></div>

<div id="overlay"></div>

<div id="nameBox">
    <h2>Nhập tên của bạn</h2>
    <input type="text" id="nameInput" placeholder="Tên của bạn...">
    <button id="okBtn" onclick="saveName()">Xác nhận</button>
</div>

<button id="nextBtn" onclick="nextText()">›</button>

<script>
let playerName = "";
let waitingForName = false;

const scenes = [
    { text: "xin chào", image: null },
    { text: "bạn đã đến với trò chơi của mình", image: null },
    { text: "bạn đã sẵn sàng chứ?", image: null },
    { text: "{name}, bây giờ chúng ta sẽ bắt đầu", image: null }
];

let index = 0;

// Tự play nhạc khi người dùng chạm màn hình lần đầu (fix autoplay mobile)
document.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    if (bgm.paused) bgm.play();
}, { once: true });

function setName() {
    waitingForName = true;
    document.getElementById("overlay").style.display = "block";
    document.getElementById("nameBox").style.display = "block";
    document.getElementById("nameInput").focus();
}

function saveName() {
    const input = document.getElementById("nameInput").value.trim();
    if (input === "") return;

    playerName = input;
    waitingForName = false;
    document.getElementById("overlay").style.display = "none";
    document.getElementById("nameBox").style.display = "none";

    displayText(scenes[index].text);
    index++;
}

function displayText(rawText) {
    const text = document.getElementById("text");
    text.style.opacity = 0;
    setTimeout(() => {
        text.innerText = rawText.replace(/{name}/g, playerName);
        text.style.opacity = 1;
    }, 800);
}

function nextText() {
    if (index >= scenes.length) return;
    if (waitingForName) return;

    const currentScene = scenes[index];

    if (currentScene.text.includes("{name}") && playerName === "") {
        setName();
        return;
    }

    displayText(currentScene.text);
    index++;
}

document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") saveName();
});

nextText();
</script>

</body>
</html>
